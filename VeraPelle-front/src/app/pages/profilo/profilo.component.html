<div *ngIf="profile; else notLogged">
  <h2>Profilo Utente</h2>
  <p><strong>Username:</strong> {{ profile.username }}</p>
  <p><strong>Nome:</strong> {{ profile.firstName }}</p>
  <p><strong>Cognome:</strong> {{ profile.lastName }}</p>
  <p><strong>Email:</strong> {{ profile.email }}</p>
  <!-- Aggiungi qui eventuali campi aggiuntivi -->
</div>

<ng-template #notLogged>
  <p>Non sei loggato, impossibile visualizzare il profilo.</p>
</ng-template>
